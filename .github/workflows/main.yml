name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: false
      - run: mkdir -p ~/.local/share/godot/export_templates
      - run: wget https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz
      - run: unzip -q Godot_v4.6.3-stable_export_templates.tpz -d ~/.local/share/godot/export_templates/4.6.3.stable
      - run: mv ~/.local/share/godot/export_templates/4.6.3.stable/templates/* ~/.local/share/godot/export_templates/4.6.3.stable/
      - run: rmdir ~/.local/share/godot/export_templates/4.6.3.stable/templates
      - run: godot --headless --export-release "Web" build/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build
  deploy:
    needs: export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
